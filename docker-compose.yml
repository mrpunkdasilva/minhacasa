services:
  mongodb:
    image: mongo:latest
    container_name: minhacasa-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - minhacasa-network
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: minhacasa-app
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/minhacasa
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=${AUTH_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - BLOB_READ_WRITE_TOKEN=${BLOB_READ_WRITE_TOKEN}
      - VERCEL_OIDC_TOKEN=${VERCEL_OIDC_TOKEN}
    depends_on:
      - mongodb
    networks:
      - minhacasa-network
    restart: always

networks:
  minhacasa-network:
    driver: bridge

volumes:
  mongodb_data:
